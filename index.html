<!DOCTYPE html>
<html>
<head>
    <title>😎 Mannu's Photo Gallery 📸</title>

    <style>
        body{
            background: linear-gradient(to right, #6a11cb, #2575fc);
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1{
            color: white;
            font-size: 42px;
            text-shadow: 2px 2px 8px black;
            animation: glow 2s infinite;
        }

        img{
            width: 250px;
            border-radius: 20px;
            margin: 10px;
            box-shadow: 0 0 15px white;
            transition: 0.3s;
            animation: float 3s ease-in-out infinite;
        }

        img:hover{
            transform: scale(1.1);
        }

        @keyframes glow{
            0%{color:white;}
            50%{color:yellow;}
            100%{color:white;}
        }

        @keyframes float{
            0%{transform:translateY(0);}
            50%{transform:translateY(-10px);}
            100%{transform:translateY(0);}
        }
    </style>

</head>

<body>

<h1>✨ Welcome to Mannu's Gallery ✨</h1>
