<!DOCTYPE html>
<html>
<head>
<title>😎 Mannu's Photo Gallery 📸</title>

<style>

body{
    background: linear-gradient(135deg, red, orange, yellow, green, cyan, blue, purple);
    text-align:center;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
 font-size:50px;
    font-weight:bold;
    text-align:center;
    animation: rainbow 3s infinite;
}

img{
    width:250px;
    margin:12px;
    border-radius:20px;
    box-shadow:0 0 20px white;
    transition:0.4s;
    animation:float 3s ease-in-out infinite;
}

img:hover{
    transform:scale(1.1);
    box-shadow:0 0 35px yellow;
}

@keyframes neon{
    from{
        text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
    }

    to{
        text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
    }
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}
@keyframes rainbow{
    0%{
        color:red;
        text-shadow:0 0 10px red;
    }

    20%{
        color:orange;
        text-shadow:0 0 10px orange;
    }

    40%{
        color:yellow;
        text-shadow:0 0 10px yellow;
    }

    60%{
        color:lime;
        text-shadow:0 0 10px lime;
    }

    80%{
        color:cyan;
        text-shadow:0 0 10px cyan;
    }

    100%{
        color:magenta;
        text-shadow:0 0 10px magenta;
    }
}
</style>

</head>

<body>

<h1>✨ Welcome to Mannu's Gallery ✨</h1>
