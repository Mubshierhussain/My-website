<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Mannu's Gallery ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(-45deg,#ff0080,#7928ca,#2af598,#009efd);
background-size:400% 400%;
animation:bg 12s ease infinite;
padding:40px;
text-align:center;
min-height: 100vh;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,.12);
backdrop-filter:blur(16px);
border-radius:20px;
padding:30px;
}
h1{
color:#fff;
font-size:48px;
animation:glow 2s infinite alternate;
margin-bottom:25px;
}
@keyframes glow{
from{text-shadow:0 0 10px cyan,0 0 25px cyan}
to{text-shadow:0 0 10px yellow,0 0 35px yellow}
}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.gallery img{
width:100%;
max-width: 250px:
border-radius:18px;
box-shadow:0 0 18px white;
transition:.3s;
animation:float 3s ease-in-out infinite;
}
.gallery img:hover{transform:scale(1.08)}
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}
button{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff0080;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>✨ Welcome To Mannu's Gallery ✨</h1>
<div class="gallery">
<a href="P1.JPG.jpg" target="_blank"><img src="P1.JPG.jpg"></a>
<a href="P2.JPG.jpg" target="_blank"><img src="P2.JPG.jpg"></a>
<a href="P3.JPG.jpg" target="_blank"><img src="P3.JPG.jpg"></a>
<a href="P4.JPG.jpg" target="_blank"><img src="P4.JPG.jpg"></a>
<a href="P5.JPG.jpg" target="_blank"><img src="P5.JPG.jpg"></a>
</div>
<button onclick="alert('Welcome Mannu! 🎉')">❤️ Click Me ❤️</button>
</div>
</body>
</html>
